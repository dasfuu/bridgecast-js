<!DOCTYPE html>

  <meta charset="UTF-8">
  <title>Bridge Cast Mixer</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      padding: 0;
      margin: 1rem;
    }

    #inputs, #outputs, #effects, #controls {
      width: 100%;
      flex-wrap: wrap;
      display: flex;
      flex-direction: row;
      gap: 1rem;
    }

    .channel {
      background: #1c1c1c;
      padding: 1rem;
      border-radius: .8rem;
      flex-direction: column;
      text-align: center;
      align-items: center;
      display: flex;
      gap: 0;

      h3 {
        margin:0;
        padding:0;
      }
    }

    .channel-controls {
      background: #1c1c1c;
      padding: 1rem;
      border-radius: .8rem;
      text-align: center;
      display: flex;
      gap: 1rem;
      margin:0;
      padding:0;
    }

    .slider {
      writing-mode: vertical-lr;
      direction: rtl;           /* makes low at bottom, high at top */
      width: 30px;
      height: 150px;
    }

    .slider::-webkit-slider-thumb {
      cursor: pointer;
    }

    .label {
      font-size: 12px;
      margin-top: 8px;
    }

    .value {
      font-size: 11px;
      color: #aaa;
    }
  </style>
  <script src="data.js" type="text/javascript"></script>
  <script src="layout.js" type="text/javascript"></script>
  <script src="colorconverter.js" type="text/javascript"></script>
  <script src="bridgecast.js" type="text/javascript"></script>
</head>
